# security/secrets-management/external-secrets.yaml
# External Secrets Operator (ESO) — pulls secrets from GCP Secret Manager
# into Kubernetes Secrets automatically.
#
# WHY: Never store real secrets in Git or K8s etcd.
#      Secret Manager has audit logs, versioning, auto-rotation.
#
# Install ESO:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets --create-namespace

---
# SecretStore — tells ESO how to connect to GCP Secret Manager
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-store
  namespace: ecommerce
spec:
  provider:
    gcpsm:
      projectID: YOUR_GCP_PROJECT_ID   # replace
      auth:
        workloadIdentity:
          clusterLocation: asia-south1
          clusterName: ecommerce-cluster
          serviceAccountRef:
            name: ecommerce-sa    # already created in rbac.yaml

---
# ExternalSecret — syncs DB credentials from GCP Secret Manager -> K8s Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: catalog-db-secret
  namespace: ecommerce
spec:
  refreshInterval: 1h       # re-sync every hour (picks up rotated secrets)
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: catalog-secret    # creates/updates this K8s Secret
    creationPolicy: Owner
  data:
    - secretKey: DB_USER    # key inside the K8s Secret
      remoteRef:
        key: ecommerce-catalog-db-user    # name in GCP Secret Manager
    - secretKey: DB_PASS
      remoteRef:
        key: ecommerce-catalog-db-pass

---
# ExternalSecret — payment service (Razorpay + DB)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-secrets
  namespace: ecommerce
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: payment-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: ecommerce-payment-db-user
    - secretKey: DB_PASS
      remoteRef:
        key: ecommerce-payment-db-pass
    - secretKey: RAZORPAY_KEY_ID
      remoteRef:
        key: ecommerce-razorpay-key-id
    - secretKey: RAZORPAY_KEY_SECRET
      remoteRef:
        key: ecommerce-razorpay-key-secret

---
# ExternalSecret — cart service
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cart-secrets
  namespace: ecommerce
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: cart-secret
    creationPolicy: Owner
  data:
    - secretKey: SESSION_SECRET
      remoteRef:
        key: ecommerce-cart-session-secret

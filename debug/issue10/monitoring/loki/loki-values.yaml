# monitoring/loki/loki-values.yaml
# Loki = log aggregation (like Elasticsearch but lighter)
# Promtail = log collector (runs on each node, ships logs to Loki)
# Together they replace expensive ELK stack
#
# Install:
# helm repo add grafana https://grafana.github.io/helm-charts
# helm install loki grafana/loki-stack \
#   --namespace monitoring \
#   --values monitoring/loki/loki-values.yaml

loki:
  enabled: true
  persistence:
    enabled: true
    size: 20Gi
  config:
    limits_config:
      retention_period: 720h     # 30 days
      ingestion_rate_mb: 16
      max_entries_limit_per_query: 5000
    chunk_store_config:
      max_look_back_period: 720h

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
    snippets:
      # Only collect logs from ecommerce namespace
      scrapeConfigs: |
        - job_name: ecommerce-pods
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names: [ecommerce]
          pipeline_stages:
            # Parse JSON logs (our services emit JSON)
            - json:
                expressions:
                  severity:    severity
                  service:     service
                  message:     message
                  duration_ms: duration_ms
                  status:      status
            # Add as Loki labels for fast filtering
            - labels:
                severity:
                service:
            # Drop debug logs in production (save storage)
            - drop:
                expression: '.*severity="DEBUG".*'

grafana:
  enabled: false    # already installed via kube-prometheus-stack

# local-dev/docker-compose.yaml
# Run the full platform locally — no GCP needed for development
# Usage:
#   cd local-dev
#   docker compose up --build
#   Open: http://localhost:8080

version: "3.9"

services:
  # ── PostgreSQL (replaces Cloud SQL) ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Catalog Service ──────────────────────────────────────────────────────────
  catalog:
    build:
      context: ../services/catalog
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_PORT: "8000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: catalog
      DB_USER: appuser
      DB_PASS: localpassword
      LOG_LEVEL: DEBUG
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../services/catalog:/app    # hot reload in dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Cart Service ─────────────────────────────────────────────────────────────
  cart:
    build:
      context: ../services/cart
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      APP_ENV: development
      APP_PORT: "8001"
      LOG_LEVEL: DEBUG
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    volumes:
      - ../services/cart:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # ── Payment Service ──────────────────────────────────────────────────────────
  payment:
    build:
      context: ../services/payment
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      APP_ENV: development
      APP_PORT: "8002"
      DB_HOST: postgres
      DB_NAME: orders
      DB_USER: appuser
      DB_PASS: localpassword
      LOG_LEVEL: DEBUG
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../services/payment:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  # ── API Gateway ──────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      CATALOG_URL: "http://catalog:8000"
      CART_URL: "http://cart:8001"
      PAYMENT_URL: "http://payment:8002"
      LOG_LEVEL: DEBUG
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    depends_on:
      - catalog
      - cart
      - payment
    volumes:
      - ../services/api-gateway:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload

  # ── Prometheus (local metrics) ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

  # ── Grafana (local dashboards) ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  # ── Loki + Promtail (local log aggregation) ───────────────────────────────
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  # ── OpenTelemetry Collector (local tracing) ───────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector metrics
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml

  # ── Jaeger (local trace UI — replaces Cloud Trace) ────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC collector
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  postgres_data:
  grafana_data:

# local-dev/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: catalog
    static_configs:
      - targets: ['catalog:8000']
    metrics_path: /metrics

  - job_name: cart
    static_configs:
      - targets: ['cart:8001']
    metrics_path: /metrics

  - job_name: payment
    static_configs:
      - targets: ['payment:8002']
    metrics_path: /metrics

  - job_name: api-gateway
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']

# github-actions/pr-checks.yaml
# Runs on every Pull Request — blocks merge if checks fail
# Copy to .github/workflows/pr-checks.yaml in your repo

name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  # ── Lint & Format ───────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, cart, payment, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install flake8 black isort

      - name: Check formatting (black)
        run: black --check services/${{ matrix.service }}/

      - name: Check import order (isort)
        run: isort --check-only services/${{ matrix.service }}/

      - name: Lint (flake8)
        run: flake8 services/${{ matrix.service }}/ --max-line-length=120 --ignore=E501,W503

  # ── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [catalog, cart, payment]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Run tests with coverage
        run: |
          cd services/${{ matrix.service }}
          pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=70       # fail if coverage drops below 70%

  # ── Terraform Plan ──────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan (GCP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        run: |
          cd terraform/envs/prod
          terraform init -backend=false   # no backend for PR checks

      - name: Terraform Validate
        run: |
          cd terraform/envs/prod
          terraform validate

      - name: Terraform Plan
        run: |
          cd terraform/envs/prod
          terraform plan \
            -var="project_id=fake-project" \
            -var="db_password=fake-password" \
            -no-color 2>&1 | head -100 || true

  # ── Kubernetes manifest validation ──────────────────────────────────────────
  k8s-validate:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin

      - name: Validate K8s manifests
        run: |
          find k8s/ -name "*.yaml" | xargs kubeval \
            --ignore-missing-schemas \
            --skip-kinds CustomResourceDefinition

  # ── Docker build check (don't push, just verify it builds) ─────────────────
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [catalog, cart, payment, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (no push)
        run: |
          docker build \
            -t ecommerce/${{ matrix.service }}:pr-${{ github.event.number }} \
            services/${{ matrix.service }}/

      - name: Check image size
        run: |
          SIZE=$(docker image inspect ecommerce/${{ matrix.service }}:pr-${{ github.event.number }} \
            --format='{{.Size}}' | awk '{printf "%.0f\n", $1/1024/1024}')
          echo "Image size: ${SIZE}MB"
          if [ "$SIZE" -gt 500 ]; then
            echo "⚠️  Image is ${SIZE}MB — consider optimizing Dockerfile"
          fi

  # ── Security scan ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan on Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'        # don't fail PR — just report
          severity: 'CRITICAL,HIGH'

      - name: Check for hardcoded secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

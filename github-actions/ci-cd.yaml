# .github/workflows/ci-cd.yaml
# Full CI/CD Pipeline:
# Push to main → Test → Docker Build → Push to GCR → ArgoCD auto-syncs to GKE

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCR_HOSTNAME: gcr.io
  REGION: asia-south1

jobs:
  # ── Job 1: Run Tests ────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, cart, payment, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r services/${{ matrix.service }}/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: services/${{ matrix.service }}/coverage.xml

  # ── Job 2: Build & Push Docker Images ──────────────────────────────────────
  build-push:
    name: Build & Push to GCR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [catalog, cart, payment, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build \
            -t $GCR_HOSTNAME/$PROJECT_ID/${{ matrix.service }}:${{ github.sha }} \
            -t $GCR_HOSTNAME/$PROJECT_ID/${{ matrix.service }}:latest \
            services/${{ matrix.service }}/

      - name: Push Docker image
        run: |
          docker push $GCR_HOSTNAME/$PROJECT_ID/${{ matrix.service }}:${{ github.sha }}
          docker push $GCR_HOSTNAME/$PROJECT_ID/${{ matrix.service }}:latest

      - name: Update k8s image tag in deployment YAML
        run: |
          SERVICE=${{ matrix.service }}
          SHA=${{ github.sha }}
          # Replace image tag in deployment file with exact commit SHA
          sed -i "s|gcr.io/PROJECT_ID/${SERVICE}:.*|gcr.io/${PROJECT_ID}/${SERVICE}:${SHA}|g" \
            k8s/deployments/${SERVICE}-deployment.yaml || \
          sed -i "s|gcr.io/PROJECT_ID/${SERVICE}:.*|gcr.io/${PROJECT_ID}/${SERVICE}:${SHA}|g" \
            k8s/deployments/other-deployments.yaml

      - name: Commit updated image tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "ci: update ${{ matrix.service }} image to ${{ github.sha }}"
          git push

  # ── Job 3: ArgoCD auto-picks up the git commit above and syncs to GKE ─────
  # (No extra step needed — ArgoCD polls git every 3 mins or use webhook)
  # You can force-sync manually:
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Print summary
        run: |
          echo "✅ All services built and pushed to GCR"
          echo "🔁 ArgoCD will sync to GKE within 3 minutes"
          echo "📌 Image SHA: ${{ github.sha }}"

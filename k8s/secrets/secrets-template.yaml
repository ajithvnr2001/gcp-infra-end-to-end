# k8s/secrets/secrets-template.yaml
# ⚠️  NEVER commit real values here — this is a TEMPLATE only
# Real secrets are injected by GitHub Actions using GitHub Encrypted Secrets
# To apply manually: replace <base64_value> with: echo -n "yourvalue" | base64

apiVersion: v1
kind: Secret
metadata:
  name: catalog-secret
  namespace: ecommerce
type: Opaque
data:
  DB_USER: <base64_of_db_username>
  DB_PASS: <base64_of_db_password>
---
apiVersion: v1
kind: Secret
metadata:
  name: cart-secret
  namespace: ecommerce
type: Opaque
data:
  REDIS_URL: <base64_of_redis_url>
  SESSION_SECRET: <base64_of_session_secret>
---
apiVersion: v1
kind: Secret
metadata:
  name: payment-secret
  namespace: ecommerce
type: Opaque
data:
  DB_USER: <base64_of_db_username>
  DB_PASS: <base64_of_db_password>
  RAZORPAY_KEY_ID: <base64_of_razorpay_key>
  RAZORPAY_KEY_SECRET: <base64_of_razorpay_secret>

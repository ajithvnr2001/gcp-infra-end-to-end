<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Premium E-Commerce</title>
    <meta name="description" content="Discover premium, curated goods.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-content">
            <h1 class="brand">AURA.</h1>
            <button class="cart-btn" onclick="toggleCart()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span class="cart-count" id="cart-count">0</span>
            </button>
        </div>
    </nav>

    <header class="hero">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="hero-content">
            <h2 class="gradient-text">Elevate Your Lifestyle</h2>
            <p>Curated tech, apparel, and accessories for the modern aesthetic.</p>
        </div>
    </header>

    <main class="container">
        <section class="products">
            <div class="section-headers">
                <h3>Trending Catalog</h3>
                <div class="loader" id="loader"></div>
            </div>
            <div class="product-grid" id="product-grid">
                <!-- Products dynamically rendered here -->
            </div>
            <div id="error-message" class="error-msg hidden">
                Unable to load products. Retrying...
            </div>
        </section>
    </main>

    <!-- Cart Overlay -->
    <div class="cart-overlay hidden" id="cart-overlay" onclick="toggleCart()">
        <div class="cart-panel glass-panel" onclick="event.stopPropagation()">
            <div class="cart-header">
                <h3>Your Cart</h3>
                <button class="close-btn" onclick="toggleCart()">✕</button>
            </div>
            <div class="cart-items" id="cart-items">
                <p class="empty-cart">Your cart is feeling light.</p>
            </div>
            <div class="cart-footer">
                <div class="total-row">
                    <span>Total</span>
                    <span id="cart-total">$0.00</span>
                </div>
                <button class="checkout-btn" onclick="checkout()">Secure Checkout</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

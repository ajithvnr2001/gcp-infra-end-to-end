# monitoring/slo/burn-rate-alerts.yaml
# Multi-window Multi-burn-rate Alerting (Google SRE Book Chapter 5)
#
# Concept:
#   If you burn your entire monthly error budget in 1 hour → that's 720x burn rate
#   Alert at 14x burn rate  (fast) → page someone NOW
#   Alert at 6x  burn rate  (slow) → page within hours
#   Alert at 1x  burn rate  (trend)→ create ticket
#
# For 99.9% SLO (0.1% error budget):
#   14x burn → 1.4% error rate sustained for 1h
#   6x  burn → 0.6% error rate sustained for 6h

groups:
  - name: ecommerce.slo.payment
    rules:
      # ── Fast burn (page NOW) ──────────────────────────────────────────────
      - alert: PaymentSLOFastBurn
        expr: |
          (
            rate(http_requests_total{service="payment-service",status=~"5.."}[1h])
            /
            rate(http_requests_total{service="payment-service"}[1h])
          ) > (14 * 0.001)
          AND
          (
            rate(http_requests_total{service="payment-service",status=~"5.."}[5m])
            /
            rate(http_requests_total{service="payment-service"}[5m])
          ) > (14 * 0.001)
        for: 2m
        labels:
          severity: critical
          slo: payment_availability
          burn_rate: fast
        annotations:
          summary: "🚨 Payment SLO — FAST BURN — Page on-call NOW"
          description: >
            Payment service is burning error budget at 14x rate.
            At this rate, monthly error budget exhausted in ~2 hours.
            Current error rate: {{ $value | humanizePercentage }}
          runbook: "https://wiki/runbooks/payment-slo-breach"

      # ── Slow burn (page in hours) ─────────────────────────────────────────
      - alert: PaymentSLOSlowBurn
        expr: |
          (
            rate(http_requests_total{service="payment-service",status=~"5.."}[6h])
            /
            rate(http_requests_total{service="payment-service"}[6h])
          ) > (6 * 0.001)
          AND
          (
            rate(http_requests_total{service="payment-service",status=~"5.."}[30m])
            /
            rate(http_requests_total{service="payment-service"}[30m])
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          slo: payment_availability
          burn_rate: slow
        annotations:
          summary: "⚠️  Payment SLO — SLOW BURN — Investigate within hours"
          description: >
            Payment service is burning error budget at 6x rate.
            At this rate, monthly error budget exhausted in ~5 days.
            Current error rate: {{ $value | humanizePercentage }}

      # ── Error budget remaining tracker ────────────────────────────────────
      - record: payment:error_budget_remaining:ratio
        expr: |
          1 - (
            sum(rate(http_requests_total{service="payment-service",status=~"5.."}[30d]))
            /
            sum(rate(http_requests_total{service="payment-service"}[30d]))
          ) / 0.001

      - alert: PaymentErrorBudgetLow
        expr: payment:error_budget_remaining:ratio < 0.25
        labels:
          severity: warning
          slo: payment_availability
        annotations:
          summary: "⚠️  Payment error budget < 25% remaining this month"
          description: "Only {{ $value | humanizePercentage }} of error budget left. Freeze risky deployments."

  - name: ecommerce.slo.catalog
    rules:
      - alert: CatalogSLOFastBurn
        expr: |
          (
            rate(http_requests_total{service="catalog-service",status=~"5.."}[1h])
            /
            rate(http_requests_total{service="catalog-service"}[1h])
          ) > (14 * 0.005)
        for: 2m
        labels:
          severity: critical
          slo: catalog_availability
        annotations:
          summary: "🚨 Catalog SLO — FAST BURN"
          description: "Catalog service burning error budget at 14x. Error rate: {{ $value | humanizePercentage }}"

  - name: ecommerce.slo.latency
    rules:
      - alert: APIGatewayLatencySLOBurn
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{service="api-gateway"}[5m])
          ) > 0.3
        for: 10m
        labels:
          severity: warning
          slo: api_latency
        annotations:
          summary: "⚠️  API Gateway P95 latency SLO breach"
          description: "P95 latency is {{ $value }}s — SLO target is 300ms"

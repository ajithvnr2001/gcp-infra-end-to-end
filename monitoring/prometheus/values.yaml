# monitoring/prometheus/values.yaml
# Install with:
# helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
# helm repo update
# helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#   --namespace monitoring --create-namespace \
#   --values monitoring/prometheus/values.yaml

prometheusOperator:
  admissionWebhooks:
    enabled: true
  tls:
    enabled: true

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "10GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    # Scrape all pods with annotation: prometheus.io/scrape: "true"
    additionalScrapeConfigs:
      - job_name: ecommerce-services
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [ecommerce]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

    # Alert rules for ecommerce platform
    additionalPrometheusRulesMap:
      ecommerce-rules:
        groups:
          - name: ecommerce.availability
            interval: 30s
            rules:
              - alert: ServiceDown
                expr: up{namespace="ecommerce"} == 0
                for: 1m
                labels:
                  severity: critical
                  team: platform
                annotations:
                  summary: "Service {{ $labels.service }} is DOWN"
                  description: "{{ $labels.service }} has been down for more than 1 minute"

              - alert: HighErrorRate
                expr: |
                  rate(http_requests_total{namespace="ecommerce", status=~"5.."}[5m])
                  /
                  rate(http_requests_total{namespace="ecommerce"}[5m]) > 0.01
                for: 2m
                labels:
                  severity: critical
                annotations:
                  summary: "High error rate on {{ $labels.service }}"
                  description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.service }}"

              - alert: HighLatency
                expr: |
                  histogram_quantile(0.99,
                    rate(http_request_duration_seconds_bucket{namespace="ecommerce"}[5m])
                  ) > 1.0
                for: 5m
                labels:
                  severity: warning
                annotations:
                  summary: "P99 latency > 1s on {{ $labels.service }}"
                  description: "P99 latency is {{ $value }}s"

              - alert: HPAMaxedOut
                expr: |
                  kube_horizontalpodautoscaler_status_current_replicas{namespace="ecommerce"}
                  ==
                  kube_horizontalpodautoscaler_spec_max_replicas{namespace="ecommerce"}
                for: 5m
                labels:
                  severity: warning
                annotations:
                  summary: "HPA maxed out for {{ $labels.horizontalpodautoscaler }}"
                  description: "Consider increasing maxReplicas — flash sale may be causing overload"

              - alert: PodCrashLooping
                expr: |
                  rate(kube_pod_container_status_restarts_total{namespace="ecommerce"}[15m]) > 0
                for: 5m
                labels:
                  severity: critical
                annotations:
                  summary: "Pod {{ $labels.pod }} is crash looping"

              - alert: PaymentServiceSLOBreach
                expr: |
                  (
                    1 - (
                      rate(http_requests_total{service="payment-service", status=~"2.."}[1h])
                      /
                      rate(http_requests_total{service="payment-service"}[1h])
                    )
                  ) > 0.001
                for: 5m
                labels:
                  severity: critical
                  slo: payment_availability
                annotations:
                  summary: "Payment service SLO breach — availability below 99.9%"

grafana:
  enabled: true
  adminPassword: "admin"   # change in production — use a secret
  persistence:
    enabled: true
    size: 5Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  grafana.ini:
    server:
      root_url: "http://localhost:3000"
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: ecommerce
          orgId: 1
          folder: Ecommerce
          type: file
          disableDeletion: true
          options:
            path: /var/lib/grafana/dashboards/ecommerce

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 5Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: [alertname, service]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: slack-critical
      routes:
        - match:
            severity: critical
          receiver: slack-critical
        - match:
            severity: warning
          receiver: slack-warning
    receivers:
      - name: slack-critical
        slack_configs:
          - api_url: "YOUR_SLACK_WEBHOOK_URL"   # set via secret
            channel: "#alerts-critical"
            title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
      - name: slack-warning
        slack_configs:
          - api_url: "YOUR_SLACK_WEBHOOK_URL"
            channel: "#alerts-warning"
            title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

nodeExporter:
  enabled: true

kubeProxy:
  enabled: true

kubeStateMetrics:
  enabled: true

coreDns:
  enabled: true

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false

kubelet:
  enabled: true
